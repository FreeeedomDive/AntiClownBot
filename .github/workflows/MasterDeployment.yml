name: Master Deployment

on:
  workflow_call:
    inputs:
      base-sha:
        type: string
        required: false
        default: ''
      components:
        type: string
        required: false
        default: auto
  workflow_dispatch:
    inputs:
      components:
        description: 'auto, all, or comma-separated: api,data-api,entertainment-api,discord-bot,events-daemon,telegram-bot,web-api,frontend,nginx,migrate-api,migrate-data-api,migrate-entertainment-api,migrate-discord-bot'
        type: string
        required: true
        default: auto

jobs:
  detect-changes:
    name: Detect Changes for Deployments
    uses: ./.github/workflows/DetectChanges.yml
    with:
      base-sha: ${{ inputs.base-sha }}
      components: ${{ inputs.components }}

  migrate_api:
    name: Migrate Api PostgreSql
    needs: [detect-changes]
    if: ${{ needs.detect-changes.outputs.migrate_api == 'true' && !failure() && !cancelled() }}
    uses: ./.github/workflows/DeployImage.yml
    with:
      build-context: src
      dockerfile: src/Api/AntiClown.Api.PostgreSqlMigrationsApplier/Dockerfile
      dockerimage: anticlownapipostgresql
      values-file: values/anticlown/api.yaml
      values-key: .migration.image.tag
    secrets: inherit

  migrate_data_api:
    name: Migrate Data.Api PostgreSql
    needs: [detect-changes]
    if: ${{ needs.detect-changes.outputs.migrate_data_api == 'true' && !failure() && !cancelled() }}
    uses: ./.github/workflows/DeployImage.yml
    with:
      build-context: src
      dockerfile: src/DataApi/AntiClown.Data.Api.PostgreSqlMigrationsApplier/Dockerfile
      dockerimage: anticlowndataapipostgresql
      values-file: values/anticlown/data-api.yaml
      values-key: .migration.image.tag
    secrets: inherit

  migrate_entertainment_api:
    name: Migrate Entertainment.Api PostgreSql
    needs: [detect-changes]
    if: ${{ needs.detect-changes.outputs.migrate_entertainment_api == 'true' && !failure() && !cancelled() }}
    uses: ./.github/workflows/DeployImage.yml
    with:
      build-context: src
      dockerfile: src/EntertainmentApi/AntiClown.Entertainment.Api.PostgreSqlMigrationsApplier/Dockerfile
      dockerimage: anticlownentertainmentapipostgresql
      values-file: values/anticlown/entertainment-api.yaml
      values-key: .migration.image.tag
    secrets: inherit

  migrate_discord_bot:
    name: Migrate DiscordBot PostgreSql
    needs: [detect-changes]
    if: ${{ needs.detect-changes.outputs.migrate_discord_bot == 'true' && !failure() && !cancelled() }}
    uses: ./.github/workflows/DeployImage.yml
    with:
      build-context: src
      dockerfile: src/DiscordBot/AntiClown.DiscordBot.PostgreSqlMigrationsApplier/Dockerfile
      dockerimage: anticlowndiscordbotpostgresql
      values-file: values/anticlown/discord-bot.yaml
      values-key: .migration.image.tag
    secrets: inherit

  deploy_data_api:
    name: Deploy Data.Api
    needs: [detect-changes, migrate_data_api]
    if: ${{ needs.detect-changes.outputs.deploy_data_api == 'true' && !failure() && !cancelled() }}
    uses: ./.github/workflows/DeployImage.yml
    with:
      build-context: src
      dockerfile: src/DataApi/AntiClown.Data.Api/Dockerfile
      dockerimage: anticlowndataapi
      values-file: values/anticlown/data-api.yaml
    secrets: inherit

  deploy_api:
    name: Deploy Api
    needs: [detect-changes, migrate_api]
    if: ${{ needs.detect-changes.outputs.deploy_api == 'true' && !failure() && !cancelled() }}
    uses: ./.github/workflows/DeployImage.yml
    with:
      build-context: src
      dockerfile: src/Api/AntiClown.Api/Dockerfile
      dockerimage: anticlownapi
      values-file: values/anticlown/api.yaml
    secrets: inherit

  deploy_entertainment_api:
    name: Deploy Entertainment.Api
    needs: [detect-changes, migrate_entertainment_api]
    if: ${{ needs.detect-changes.outputs.deploy_entertainment_api == 'true' && !failure() && !cancelled() }}
    uses: ./.github/workflows/DeployImage.yml
    with:
      build-context: src
      dockerfile: src/EntertainmentApi/AntiClown.Entertainment.Api/Dockerfile
      dockerimage: anticlownentertainmentapi
      values-file: values/anticlown/entertainment-api.yaml
    secrets: inherit

  deploy_discord_bot:
    name: Deploy DiscordBot
    needs: [detect-changes, migrate_discord_bot, deploy_data_api, deploy_api, deploy_entertainment_api]
    if: ${{ needs.detect-changes.outputs.deploy_discord_bot == 'true' && !failure() && !cancelled() }}
    uses: ./.github/workflows/DeployImage.yml
    with:
      build-context: src
      dockerfile: src/DiscordBot/AntiClown.DiscordBot/Dockerfile
      dockerimage: anticlowndiscordbot
      values-file: values/anticlown/discord-bot.yaml
    secrets: inherit

  deploy_events_daemon:
    name: Deploy EventsDaemon
    needs: [detect-changes, deploy_data_api, deploy_api, deploy_entertainment_api]
    if: ${{ needs.detect-changes.outputs.deploy_events_daemon == 'true' && !failure() && !cancelled() }}
    uses: ./.github/workflows/DeployImage.yml
    with:
      build-context: src
      dockerfile: src/AntiClown.EventsDaemon/Dockerfile
      dockerimage: anticlowneventsdaemon
      values-file: values/anticlown/events-daemon.yaml
    secrets: inherit

  deploy_telegram_bot:
    name: Deploy TelegramBot
    needs: [detect-changes, deploy_data_api, deploy_api, deploy_entertainment_api]
    if: ${{ needs.detect-changes.outputs.deploy_telegram_bot == 'true' && !failure() && !cancelled() }}
    uses: ./.github/workflows/DeployImage.yml
    with:
      build-context: src
      dockerfile: src/AntiClown.Telegram.Bot/Dockerfile
      dockerimage: anticlowntelegrambot
      values-file: values/anticlown/telegram-bot.yaml
    secrets: inherit

  deploy_web_api:
    name: Deploy Web.Api
    needs: [detect-changes, deploy_data_api, deploy_api, deploy_entertainment_api]
    if: ${{ needs.detect-changes.outputs.deploy_web_api == 'true' && !failure() && !cancelled() }}
    uses: ./.github/workflows/DeployImage.yml
    with:
      build-context: src
      dockerfile: src/Web/AntiClown.Web.Api/Dockerfile
      dockerimage: anticlownwebapi
      values-file: values/anticlown/web-api.yaml
    secrets: inherit

  deploy_front:
    name: Deploy Web.Front
    needs: [detect-changes, deploy_web_api]
    if: ${{ needs.detect-changes.outputs.deploy_front == 'true' && !failure() && !cancelled() }}
    uses: ./.github/workflows/DeployImage.yml
    with:
      build-context: src/Web/AntiClown.Web.Front
      dockerfile: src/Web/AntiClown.Web.Front/Dockerfile
      dockerimage: anticlownwebfront
      values-file: values/anticlown/web-front.yaml
      prepare-command: ./scripts/fetch-tg-sdk.sh
      prepare-working-directory: src/Web/AntiClown.Web.Front
    secrets: inherit

  deploy_nginx:
    name: Deploy Nginx
    needs: [detect-changes]
    if: ${{ needs.detect-changes.outputs.deploy_nginx == 'true' && !failure() && !cancelled() }}
    uses: ./.github/workflows/DeployImage.yml
    with:
      build-context: nginx
      dockerfile: nginx/Dockerfile
      dockerimage: anticlownnginx
      values-file: values/anticlown/nginx.yaml
    secrets: inherit
