name: Frontend Checks

on:
  workflow_call:
  workflow_dispatch:

jobs:
  frontend-checks:
    name: Frontend Lint, Format, and Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Web/AntiClown.Web.Front
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/Web/AntiClown.Web.Front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        if: ${{ !cancelled() }}
        run: npm run format:check
