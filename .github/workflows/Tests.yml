name: Tests

on:
  workflow_call:
  workflow_dispatch:

jobs:
  tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ./src/AntiClownBot.slnx

      - name: Build
        run: dotnet build ./src/AntiClownBot.slnx --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test ./src/AntiClownBot.slnx --configuration Release --no-restore --no-build
